name: develop-CD

on:
  push:
    branches: [ "develop" ]

jobs:
  ci:
    runs-on: ubuntu-22.04
    env:
      working-directory: .

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create application.yml
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION }}" > ./src/main/resources/application.yml
          echo "${{ secrets.APPLICATION_DEV }}" > ./src/main/resources/application-dev.yml
        shell: bash

      - name: Build Project
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -Dspring.profiles.active=dev --no-daemon
        shell: bash

      - name: Verify JAR file
        run: |
          if [ -f "${{ secrets.EC2_JAR_SOURCE }}" ]; then
            echo "JAR file created successfully"
            ls -la ./build/libs/
            echo "File size: $(stat -c%s ${{ secrets.EC2_JAR_SOURCE }}) bytes"
          else
            echo "JAR file not found!"
            ls -la ./build/libs/ || echo "build/libs directory not found"
            exit 1
          fi
        shell: bash

      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_KEY }}
          source: ${{ secrets.EC2_JAR_SOURCE }}
          target: ${{ secrets.EC2_JAR_TARGET }}
          timeout: 300s
          overwrite: true
  cd:
    needs: ci
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy to Development Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_KEY }}
          timeout: 300s
          script: |
            # 업로드된 JAR 파일 경로 (Secrets에서 가져온 target 경로 사용)
            SOURCE_JAR="${{ secrets.EC2_JAR_TARGET }}"
            
            # JAR 파일 존재 확인
            if [ ! -f "$SOURCE_JAR" ]; then
              echo "JAR file not found at: $SOURCE_JAR"
              echo "Checking appleboy/scp-action generated path..."
              FALLBACK_JAR="/home/ubuntu/build/libs/lost-no-more-batch.jar"
              if [ -f "$FALLBACK_JAR" ]; then
                echo "Found JAR at fallback location: $FALLBACK_JAR"
                SOURCE_JAR="$FALLBACK_JAR"
              else
                echo "Searching for JAR files:"
                find /home/ubuntu -name "*.jar" -type f 2>/dev/null || echo "No JAR files found"
                ls -la /home/ubuntu/
                exit 1
              fi
            fi
            
            echo "Deploying JAR file to Jenkins container..."
            echo "Source: $SOURCE_JAR"
            
            # 기존 JAR 파일 정리
            sudo docker exec jenkins rm -rf /var/jenkins_home/lost-no-more-batch.jar 2>/dev/null || true
            
            # 새로운 JAR 파일을 Jenkins 컨테이너로 복사 (Secrets 사용)
            sudo docker cp $SOURCE_JAR ${{ secrets.JENKINS_JAR_TARGET }}
            
            # 복사 확인
            sudo docker exec jenkins ls -la /var/jenkins_home/lost-no-more-batch.jar
            sudo docker exec jenkins file /var/jenkins_home/lost-no-more-batch.jar
            
            echo "JAR file deployed successfully to Jenkins container"
            
            # Docker Compose 서비스 재시작
            cd /home/ubuntu/compose
            
            echo "Restarting services..."
            sudo docker compose down 2>/dev/null || echo "No services to stop"
            sudo docker compose -f docker-compose.dev.yml up -d
            
            # 서비스 상태 확인
            echo "Checking service status..."
            sleep 10
            sudo docker compose -f docker-compose.dev.yml ps
            
            # 불필요한 이미지 정리
            echo "Cleaning up unused images..."
            sudo docker image prune -f
            
            echo "Deployment completed successfully!"