spring:
  config:
    activate:
      on-profile: test

  datasource-meta:
    url: jdbc:h2:mem:testdb-meta;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  datasource-data:
    url: jdbc:h2:mem:testdb-data;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

open-api:
  url: test
  secret-key: test

kakao:
  map:
    secret-key: test
    url: test