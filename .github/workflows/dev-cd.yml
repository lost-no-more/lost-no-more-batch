name: develop-CD

on:
  push:
    branches: [ "develop" ]

env:
  JAR_NAME: lost-no-more-batch.jar
  JAR_SOURCE: ${{ secrets.EC2_JAR_SOURCE }}
  JAR_TARGET: ${{ secrets.EC2_JAR_TARGET }}
  JENKINS_TARGET: ${{ secrets.JENKINS_JAR_TARGET }}
  COMPOSE_PATH: /home/ubuntu/compose

jobs:
  ci:
    runs-on: ubuntu-22.04
    env:
      working-directory: .

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create application.yml
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION }}" > ./src/main/resources/application.yml
          echo "${{ secrets.APPLICATION_DEV }}" > ./src/main/resources/application-dev.yml
        shell: bash

      - name: Build Project
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -Dspring.profiles.active=dev --no-daemon
        shell: bash

      - name: Verify JAR file
        run: |
          if [ -f "${{ env.JAR_SOURCE }}" ]; then
            echo "JAR file created successfully"
            ls -la ./build/libs/
            echo "File size: $(stat -c%s ${{ env.JAR_SOURCE }}) bytes"
          else
            echo "JAR file not found!"
            ls -la ./build/libs/ || echo "build/libs directory not found"
            exit 1
          fi
        shell: bash

      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_KEY }}
          source: ${{ env.JAR_SOURCE }}
          target: "/home/ubuntu/"
          timeout: 300s
          overwrite: true

      - name: Verify Upload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_KEY }}
          script: |
            # appleboy/scp-action이 생성하는 디렉토리 구조에서 JAR 파일 확인
            UPLOADED_FILE="/home/ubuntu/build/libs/${{ env.JAR_NAME }}"
            
            if [ -f "$UPLOADED_FILE" ]; then
              echo "JAR file uploaded successfully"
              ls -la $UPLOADED_FILE
              file $UPLOADED_FILE
              echo "File size: $(stat -c%s $UPLOADED_FILE) bytes"
            else
              echo "JAR file upload failed!"
              echo "Checking directory structure:"
              find /home/ubuntu -name "*.jar" -type f 2>/dev/null || echo "No JAR files found"
              ls -la /home/ubuntu/
              exit 1
            fi

  cd:
    needs: ci
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy to Development Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_KEY }}
          timeout: 300s
          script: |
            # 업로드된 JAR 파일 경로 (appleboy/scp-action이 생성한 디렉토리 구조)
            SOURCE_JAR="/home/ubuntu/build/libs/${{ env.JAR_NAME }}"
            
            # JAR 파일 존재 확인
            if [ ! -f "$SOURCE_JAR" ]; then
              echo "JAR file not found at: $SOURCE_JAR"
              echo "Searching for JAR files:"
              find /home/ubuntu -name "*.jar" -type f 2>/dev/null || echo "No JAR files found"
              ls -la /home/ubuntu/
              exit 1
            fi
            
            echo "Deploying JAR file to Jenkins container..."
            echo "Source: $SOURCE_JAR"
            
            # 기존 JAR 파일 정리
            sudo docker exec jenkins rm -rf /var/jenkins_home/${{ env.JAR_NAME }} 2>/dev/null || true
            
            # 새로운 JAR 파일을 Jenkins 컨테이너로 복사
            sudo docker cp $SOURCE_JAR jenkins:/var/jenkins_home/${{ env.JAR_NAME }}
            
            # 복사 확인
            sudo docker exec jenkins ls -la /var/jenkins_home/${{ env.JAR_NAME }}
            sudo docker exec jenkins file /var/jenkins_home/${{ env.JAR_NAME }}
            
            echo "JAR file deployed successfully to Jenkins container"
            
            # Docker Compose 서비스 재시작
            cd ${{ env.COMPOSE_PATH }}
            
            echo "Restarting services..."
            sudo docker compose down 2>/dev/null || echo "No services to stop"
            sudo docker compose -f docker-compose.dev.yml up -d
            
            # 서비스 상태 확인
            echo "Checking service status..."
            sleep 10
            sudo docker compose -f docker-compose.dev.yml ps
            
            # 불필요한 이미지 정리
            echo "Cleaning up unused images..."
            sudo docker image prune -f
            
            echo "Deployment completed successfully!"