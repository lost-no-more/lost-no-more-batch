name: develop-CD

on:
  push:
    branches: [ "develop" ]

jobs:
  ci:
    runs-on: ubuntu-22.04
    env:
      working-directory: .

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Create application-dev.yml
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION_DEV }}" | base64 --decode > ./src/main/resources/application-dev.yml
        shell: bash

      - name: Build Project
        run: |
          chmod +x gradlew
          ./gradlew bootJar -Dspring.profiles.active=dev
        shell: bash

      - name: Upload JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_KEY }}
          source: ${{ secrets.EC2_JAR_SOURCE }}
          target: ${{ secrets.EC2_JAR_TARGET }}

  cd:
    needs: ci
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy to Development Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_KEY }}
          script: |
            sudo docker cp ${{ secrets.EC2_JAR_TARGET }} ${{ secrets.JENKINS_JAR_TARGET }}

            cd /home/ec2-user/compose
            sudo docker compose down
            sudo docker compose -f docker-compose.dev.yml up -d
            sudo docker image prune -f