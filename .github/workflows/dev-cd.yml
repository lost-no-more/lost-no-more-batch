name: develop-CD

on:
  push:
    branches: [ "develop" ]

jobs:
  ci:
    runs-on: ubuntu-22.04
    env:
      working-directory: .

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create application.yml
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION }}" > ./src/main/resources/application.yml
          echo "${{ secrets.APPLICATION_DEV }}" > ./src/main/resources/application-dev.yml
        shell: bash

      - name: Build Project
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -Dspring.profiles.active=dev --no-daemon
        shell: bash

      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_KEY }}
          source: ${{ secrets.EC2_JAR_SOURCE }}
          target: ${{ secrets.EC2_JAR_TARGET }}
          timeout: 300s
          overwrite: true
  cd:
    needs: ci
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy to Development Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_KEY }}
          timeout: 300s
          script: |
            sudo docker exec jenkins rm -rf /var/jenkins_home/lost-no-more-batch.jar 2>/dev/null || true
            
            sudo docker cp ${{ secrets.LOST_NO_MORE_BATCH_JAR }} jenkins:/var/jenkins_home/lost-no-more-batch.jar
            
            cd /home/ubuntu/compose
            
            echo "Restarting services..."
            sudo docker compose down 2>/dev/null || echo "No services to stop"
            sudo docker compose -f docker-compose.dev.yml up -d
            
            # 서비스 상태 확인
            echo "Checking service status..."
            sleep 10
            sudo docker compose -f docker-compose.dev.yml ps
            
            # 불필요한 이미지 정리
            echo "Cleaning up unused images..."
            sudo docker image prune -f
            
            echo "Deployment completed successfully!"